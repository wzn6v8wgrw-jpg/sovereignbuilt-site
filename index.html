<body>

 <div class="bracket bracket-tl"></div>
 <div class="bracket bracket-tr"></div>

 <div class="container">
   <h1>SOVEREIGNBUILT</h1>
   <p class="tagline">DESIGNER &nbsp;·&nbsp; BUILDER &nbsp;·&nbsp; BITCOIN ONLY &nbsp;·&nbsp; NOSTR ONLY</p>

   <div class="divider"></div>

   <div class="contact-box">
     <span class="section-label">WHAT WOULD YOU LIKE TO BUILD?</span>
     <div class="form-group" id="form-group">
       <input type="text" id="name" placeholder="NAME" />
       <input type="email" id="email" placeholder="EMAIL" />
       <textarea id="message" rows="4" placeholder="TELL ME WHAT YOU'RE BUILDING..."></textarea>
       <button onclick="submitForm()">SEND MESSAGE</button>
     </div>
     <p class="success-msg" id="success">✓ MESSAGE RECEIVED. I'LL BE IN TOUCH.</p>
   </div>

   <div class="nostr-section">
     <span class="section-label">FIND ME ON</span>
     <a class="nostr-link" href="https://primal.net/p/e5237023a5c0929e7ae0e5128d41a8213138400ec110dbe9d8a29278f22b7c13" target="_blank" rel="noopener">
       <svg width="16" height="16" viewBox="0 0 24 24" fill="none">

 <div class="status">SOVEREIGN NODE — ONLINE</div>

 <script>
   async function submitForm() {
     const name = document.getElementById('name').value;
     const email = document.getElementById('email').value;
     const message = document.getElementById('message').value;
     if (!name || !email || !message) return;

     const btn = document.querySelector('button');
     btn.textContent = 'SENDING...';

     try {
       const res = await fetch('https://formspree.io/f/mpqepkoa', {
         method: 'POST',
         headers: { 'Content-Type': 'application/json' },
         body: JSON.stringify({ name, email, message })
       });
       if (res.ok) {
         document.getElementById('form-group').style.display = 'none';
         document.getElementById('success').style.display = 'block';
       } else {
         btn.textContent = 'ERROR — TRY AGAIN';
       }
     } catch {
       btn.textContent = 'ERROR — TRY AGAIN';
     }
   }
 </script>
